---
# ── Ajout du repo Kubernetes ─────────────────────────────
- name: Ajouter le repo Kubernetes
  ansible.builtin.yum_repository:
    name: kubernetes
    description: Kubernetes
    baseurl: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/rpm/"
    gpgcheck: true
    gpgkey: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/rpm/repodata/repomd.xml.key"
    enabled: true
    exclude:
      - kubelet
      - kubeadm
      - kubectl

# ── Installation ─────────────────────────────────────────
- name: Installer kubeadm, kubelet et kubectl
  ansible.builtin.dnf:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    disable_excludes: kubernetes

# ── Cloud provider externe ───────────────────────────────
- name: Configurer kubelet pour cloud provider externe
  ansible.builtin.lineinfile:
    path: /etc/sysconfig/kubelet
    regexp: '^KUBELET_EXTRA_ARGS='
    line: 'KUBELET_EXTRA_ARGS=--cloud-provider=external'
    create: true
    mode: '0644'

# ── Démarrage kubelet ────────────────────────────────────
- name: Activer kubelet (démarrera après kubeadm init/join)
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
