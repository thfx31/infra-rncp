---
# Le secret cloud-config est partagé par ovh-lb (CCM) et cinder-csi.
# Il est créé ici car ovh-lb s'exécute en premier dans install-foundation.yml.

- name: Créer le secret cloud-config OpenStack
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: cloud-config
        namespace: kube-system
      type: Opaque
      stringData:
        cloud.conf: |
          [Global]
          auth-url={{ os_auth_url }}
          application-credential-id={{ os_application_credential_id }}
          application-credential-secret={{ os_application_credential_secret }}
          region={{ ovh_region }}
          tenant-id={{ os_tenant_id }}

          [LoadBalancer]
          use-octavia=true
          floating-network-id={{ os_external_network_id }}

          [BlockStorage]
          bs-version=v3

- name: Ajouter le repo Helm cloud-provider-openstack
  kubernetes.core.helm_repository:
    name: cpo
    repo_url: https://kubernetes.github.io/cloud-provider-openstack

- name: Installer openstack-cloud-controller-manager
  kubernetes.core.helm:
    name: openstack-ccm
    chart_ref: cpo/openstack-cloud-controller-manager
    chart_version: "{{ ovh_ccm_chart_version }}"
    release_namespace: kube-system
    values:
      secret:
        create: false
        name: cloud-config
      cloudConfig:
        enabled: false
      tolerations:
        - key: node.cloudprovider.kubernetes.io/uninitialized
          value: "true"
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
    wait: true
    wait_timeout: "180s"
