[defaults]
inventory = inventory.py
remote_user = almalinux
host_key_checking = False
private_key_file = ~/.ssh/id_ed25519
timeout = 30
gather_timeout = 30

[privilege_escalation]
become = true
become_method = sudo

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=10 -o ServerAliveCountMax=3 -o ConnectTimeout=30
