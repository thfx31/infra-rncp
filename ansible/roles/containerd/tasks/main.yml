---
# ── Ajout du repo Docker (pour containerd) ───────────────
- name: Ajouter le repo Docker CE
  ansible.builtin.yum_repository:
    name: docker-ce
    description: Docker CE Stable
    baseurl: https://download.docker.com/linux/centos/$releasever/$basearch/stable
    gpgcheck: true
    gpgkey: https://download.docker.com/linux/centos/gpg
    enabled: true

# ── Installation ─────────────────────────────────────────
- name: Installer containerd
  ansible.builtin.dnf:
    name: containerd.io
    state: present

# ── Configuration ────────────────────────────────────────
- name: Vérifier si la config containerd existe
  ansible.builtin.stat:
    path: /etc/containerd/config.toml
  register: containerd_config

- name: Générer la config par défaut de containerd
  ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
  when: not containerd_config.stat.exists
  notify: Restart containerd

- name: Activer le plugin CRI dans containerd
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^disabled_plugins'
    line: 'disabled_plugins = []'
  notify: Restart containerd

- name: Activer SystemdCgroup dans containerd
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^\s*SystemdCgroup\s*='
    line: '            SystemdCgroup = true'
  notify: Restart containerd

# ── Démarrage ────────────────────────────────────────────
- name: Activer et démarrer containerd
  ansible.builtin.systemd:
    name: containerd
    state: started
    enabled: true
    daemon_reload: true
