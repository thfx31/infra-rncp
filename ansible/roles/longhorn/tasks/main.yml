---
- name: Ajouter le repo Helm Longhorn
  kubernetes.core.helm_repository:
    name: longhorn
    repo_url: https://charts.longhorn.io

- name: Créer le namespace longhorn-system
  kubernetes.core.k8s:
    name: longhorn-system
    api_version: v1
    kind: Namespace
    state: present

- name: Installer Longhorn
  kubernetes.core.helm:
    name: longhorn
    chart_ref: longhorn/longhorn
    chart_version: "{{ longhorn_chart_version }}"
    release_namespace: longhorn-system
    values:
      defaultSettings:
        defaultReplicaCount: "{{ longhorn_replica_count }}"
        storageMinimalAvailablePercentage: "{{ longhorn_storage_minimal_available }}"
        storageOverProvisioningPercentage: "{{ longhorn_storage_over_provisioning }}"
      persistence:
        defaultClassReplicaCount: "{{ longhorn_replica_count }}"

- name: Attendre que Longhorn soit prêt
  kubernetes.core.k8s_info:
    kind: DaemonSet
    name: longhorn-manager
    namespace: longhorn-system
    wait: true
    wait_timeout: 300