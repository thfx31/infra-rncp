---
# Play 1 : Prérequis sur les nodes (nécessite SSH + sudo)
- name: Prérequis fondation sur les nodes
  hosts: k8s_cluster
  become: true

  tasks:
    - name: Installer les prérequis Longhorn
      ansible.builtin.dnf:
        name:
          - iscsi-initiator-utils
          - nfs-utils
        state: present

    - name: Activer et démarrer iscsid
      ansible.builtin.systemd:
        name: iscsid
        state: started
        enabled: true

# Play 2 : Installation des composants K8s (via API)
- name: Installer les composants fondation du cluster
  hosts: localhost
  connection: local
  gather_facts: false
  become: false

  roles:
    - cilium
    - longhorn
    - argocd
