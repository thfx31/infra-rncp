---
# ── Vérifier si le cluster est déjà initialisé ──────────
- name: Vérifier si kubeadm est déjà initialisé
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_already_init

# ── kubeadm init ─────────────────────────────────────────
- name: Initialiser le cluster Kubernetes
  ansible.builtin.command: >
    kubeadm init
    --pod-network-cidr=10.244.0.0/16
    --control-plane-endpoint={{ ansible_host }}
    --apiserver-advertise-address={{ ansible_default_ipv4.address }}
  when: not kubeadm_already_init.stat.exists
  register: kubeadm_init

# ── Kubeconfig pour l'utilisateur courant ────────────────
- name: Créer le répertoire .kube
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Copier le kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/{{ ansible_user }}/.kube/config"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
    remote_src: true

# ── Récupérer la commande join ───────────────────────────
- name: Générer le token et la commande join
  ansible.builtin.command: kubeadm token create --print-join-command
  register: join_command
  changed_when: false

- name: Stocker la commande join comme fact
  ansible.builtin.set_fact:
    kubeadm_join_command: "{{ join_command.stdout }}"
