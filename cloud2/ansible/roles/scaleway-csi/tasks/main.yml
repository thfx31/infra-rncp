---
- name: Ajouter le repo Helm Scaleway
  kubernetes.core.helm_repository:
    name: scaleway
    repo_url: https://scaleway.github.io/helm-charts

- name: Installer scaleway-csi
  kubernetes.core.helm:
    name: scaleway-csi
    chart_ref: scaleway/scaleway-csi
    chart_version: "{{ scaleway_csi_chart_version }}"
    release_namespace: kube-system
    values:
      controller:
        scaleway:
          existingSecretName: scaleway-secret
      node:
        scaleway:
          existingSecretName: scaleway-secret
      storageClass:
        defaultClass: true
    wait: true
    wait_timeout: "300s"

- name: Vérifier que scaleway-csi-node est prêt
  kubernetes.core.k8s_info:
    kind: DaemonSet
    namespace: kube-system
    name: scaleway-csi-node
  register: csi_node_ds
  until: >
    csi_node_ds.resources | length > 0 and
    csi_node_ds.resources[0].status.numberReady is defined and
    csi_node_ds.resources[0].status.numberReady ==
    csi_node_ds.resources[0].status.desiredNumberScheduled
  retries: 20
  delay: 10
  ignore_errors: true
