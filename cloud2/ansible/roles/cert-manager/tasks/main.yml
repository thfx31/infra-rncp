---
- name: Ajouter le repo Helm cert-manager
  kubernetes.core.helm_repository:
    name: jetstack
    repo_url: https://charts.jetstack.io

- name: Créer le namespace cert-manager
  kubernetes.core.k8s:
    name: "{{ certmanager_namespace }}"
    api_version: v1
    kind: Namespace
    state: present

- name: Installer cert-manager
  kubernetes.core.helm:
    name: cert-manager
    chart_ref: jetstack/cert-manager
    chart_version: "{{ certmanager_chart_version }}"
    release_namespace: "{{ certmanager_namespace }}"
    values:
      crds:
        enabled: true
      startupapicheck:
        enabled: false
    wait: true
    wait_timeout: "300s"

- name: Attendre que cert-manager soit prêt
  kubernetes.core.k8s_info:
    kind: Deployment
    namespace: "{{ certmanager_namespace }}"
    name: cert-manager
    wait: true
    wait_timeout: 120
    wait_condition:
      type: Available
      status: "True"

- name: Attendre que le webhook cert-manager soit prêt
  kubernetes.core.k8s_info:
    kind: Deployment
    namespace: "{{ certmanager_namespace }}"
    name: cert-manager-webhook
    wait: true
    wait_timeout: 120
    wait_condition:
      type: Available
      status: "True"

- name: Laisser le webhook cert-manager se stabiliser
  ansible.builtin.pause:
    seconds: 30

- name: Créer le secret OVH API pour le challenge DNS
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: ovh-credentials
        namespace: "{{ certmanager_namespace }}"
      type: Opaque
      stringData:
        applicationKey: "{{ ovh_application_key }}"
        applicationSecret: "{{ ovh_application_secret }}"
        consumerKey: "{{ ovh_consumer_key }}"

- name: Ajouter le repo Helm du webhook OVH
  kubernetes.core.helm_repository:
    name: cert-manager-webhook-ovh-charts
    repo_url: https://aureq.github.io/cert-manager-webhook-ovh

- name: Installer le webhook OVH pour cert-manager
  kubernetes.core.helm:
    name: cert-manager-webhook-ovh
    chart_ref: cert-manager-webhook-ovh-charts/cert-manager-webhook-ovh
    release_namespace: "{{ certmanager_namespace }}"
    values:
      groupName: acme.yplank.fr
      certManager:
        namespace: "{{ certmanager_namespace }}"
        serviceAccountName: cert-manager
      issuers:
        - name: letsencrypt-prod
          create: true
          kind: ClusterIssuer
          namespace: "{{ certmanager_namespace }}"
          acmeServerUrl: https://acme-v02.api.letsencrypt.org/directory
          email: "{{ letsencrypt_email }}"
          ovhEndpointName: "{{ ovh_endpoint }}"
          ovhAuthenticationMethod: application
          externalAccountBinding:
            enabled: false
            keyID: ""
            keySecretRef:
              name: ""
              key: ""
          ovhAuthenticationRef:
            applicationKeyRef:
              name: ovh-credentials
              key: applicationKey
            applicationSecretRef:
              name: ovh-credentials
              key: applicationSecret
            applicationConsumerKeyRef:
              name: ovh-credentials
              key: consumerKey
    wait: true
    wait_timeout: "300s"
