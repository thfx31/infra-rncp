name: Destroy K8s cluster (Scaleway)

on:
  workflow_dispatch:

env:
  TF_DIR: cloud2/terraform

jobs:
  destroy:
    name: Détruire toutes les ressources Scaleway
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.TF_BACKEND_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_BACKEND_SECRET_KEY }}
        run: terraform init

      - name: Terraform destroy
        working-directory: ${{ env.TF_DIR }}
        env:
          AWS_ACCESS_KEY_ID:          ${{ secrets.TF_BACKEND_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY:      ${{ secrets.TF_BACKEND_SECRET_KEY }}
          SCW_ACCESS_KEY:             ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY:             ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID:     ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          SCW_DEFAULT_REGION:         fr-par
          SCW_DEFAULT_ZONE:           fr-par-2
          TF_VAR_scw_region:          fr-par
          TF_VAR_scw_zone:            fr-par-2
        run: terraform destroy -auto-approve
