name: Check cluster (OVH)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"  # tous les jours à 8h UTC

env:
  TF_DIR: cloud/terraform
  KUBECONFIG: /tmp/config-ovh

jobs:
  check:
    name: Vérifier l'état du cluster
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.TF_BACKEND_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_BACKEND_SECRET_KEY }}
        run: terraform init

      - name: Récupérer l'IP du control plane
        id: cp_ip
        working-directory: ${{ env.TF_DIR }}
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.TF_BACKEND_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_BACKEND_SECRET_KEY }}
          OVH_ENDPOINT:          ovh-eu
          OVH_APPLICATION_KEY:   ${{ secrets.OVH_APPLICATION_KEY }}
          OVH_APPLICATION_SECRET: ${{ secrets.OVH_APPLICATION_SECRET }}
          OVH_CONSUMER_KEY:      ${{ secrets.OVH_CONSUMER_KEY }}
          OS_AUTH_URL:           https://auth.cloud.ovh.net/v3
          OS_TENANT_ID:          ${{ secrets.OVH_TENANT_ID }}
          OS_PASSWORD:           ${{ secrets.OS_PASSWORD }}
          TF_VAR_os_tenant_id:   ${{ secrets.OVH_TENANT_ID }}
          TF_VAR_ssh_key_name:   rncp-ovh
        run: |
          echo "ip=$(terraform output -raw control_plane_ip_public)" >> "$GITHUB_OUTPUT"

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Récupérer le kubeconfig
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
            admintf@${{ steps.cp_ip.outputs.ip }}:~/.kube/config \
            ${{ env.KUBECONFIG }}

      - name: Nodes
        run: kubectl get nodes -o wide
        env:
          KUBECONFIG: ${{ env.KUBECONFIG }}

      - name: Applications ArgoCD
        run: kubectl -n argocd get applications
        env:
          KUBECONFIG: ${{ env.KUBECONFIG }}

      - name: Certificats TLS
        run: kubectl get certificate --all-namespaces
        env:
          KUBECONFIG: ${{ env.KUBECONFIG }}

      - name: Pods non Running
        run: |
          kubectl get pods --all-namespaces \
            --field-selector=status.phase!=Running,status.phase!=Succeeded \
            | tail -30 || echo "Tous les pods sont OK"
        env:
          KUBECONFIG: ${{ env.KUBECONFIG }}

      - name: Mots de passe initiaux
        run: |
          echo "── ArgoCD ─────────────────────────────────"
          kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d && echo

          echo "── GitLab ─────────────────────────────────"
          kubectl get secret gitlab-gitlab-initial-root-password \
            -n gitlab -o jsonpath='{.data.password}' | base64 -d && echo

          echo "── Jenkins ────────────────────────────────"
          kubectl get secret jenkins -n jenkins \
            -o jsonpath='{.data.jenkins-admin-password}' | base64 -d && echo
        env:
          KUBECONFIG: ${{ env.KUBECONFIG }}
